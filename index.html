<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Saurabh ❤️ Hrutuja</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

</head>

<body>

<audio id="music" loop>
<source src="music.mp3" type="audio/mp3">
</audio>

<button id="musicBtn">🎵</button>


<!-- Curtain Section -->

<section class="panel" id="curtainPanel">

<div class="curtain left"></div>
<div class="curtain right"></div>

<button id="openBtn">Open Invitation</button>

</section>


<!-- Couple Section -->

<section class="panel hidden" id="couple">

<h1 class="names">Saurabh <span>&</span> Hrutuja</h1>

<p class="subtitle">
Together with their families invite you to celebrate their wedding
</p>

<button onclick="flowerBurst()">Celebrate 🌸</button>

</section>



<!-- Scratch Section -->

<section class="panel hidden">

<h2>Reveal the Wedding Date</h2>

<div class="coins">

<canvas class="coin" width="120" height="120"></canvas>
<canvas class="coin" width="120" height="120"></canvas>
<canvas class="coin" width="120" height="120"></canvas>

</div>

<p id="dateReveal" class="hiddenDate">01 Nov 2028</p>

</section>



<!-- Countdown Section -->

<section class="panel hidden">

<h2>Countdown to our Wedding</h2>

<div id="countdown">

<div><span id="days"></span><p>Days</p></div>
<div><span id="hours"></span><p>Hours</p></div>
<div><span id="minutes"></span><p>Minutes</p></div>
<div><span id="seconds"></span><p>Seconds</p></div>

</div>

</section>



<!-- Details -->

<section class="panel hidden">

<h2>Wedding Details</h2>

<div class="card">

<h3>Wedding Ceremony</h3>
<p>📍 Amravati</p>

</div>


<div class="card">

<h3>Reception</h3>
<p>📍 Gorakhpur</p>

</div>

</section>



<footer>

Made with ❤️ by Saurabh

</footer>


<script src="script.js"></script>

</body>
</html>
